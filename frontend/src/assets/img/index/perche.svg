<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="auto">
    <defs>
        <linearGradient id="blueGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0d6efd" />
            <stop offset="100%" stop-color="#0dcaf0" />
        </linearGradient>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffc107" />
            <stop offset="100%" stop-color="#ffda6a" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <circle cx="200" cy="200" r="180" fill="#f8f9fa" />
    <circle cx="200" cy="200" r="145" fill="#ffffff" stroke="#e9ecef" stroke-width="4"/>

    <text x="60" y="140" font-family="monospace" font-size="60" font-weight="bold" fill="#dee2e6" transform="rotate(-15 60 140)">&lt;</text>
    <text x="310" y="290" font-family="monospace" font-size="60" font-weight="bold" fill="#dee2e6" transform="rotate(15 310 290)">&gt;</text>
    <text x="110" y="330" font-family="monospace" font-size="50" font-weight="bold" fill="#dee2e6" transform="rotate(-10 110 330)">{</text>
    <text x="290" y="110" font-family="monospace" font-size="50" font-weight="bold" fill="#dee2e6" transform="rotate(20 290 110)">}</text>

    <path d="M 90 270 L 160 180 L 230 220 L 300 120" fill="none" stroke="url(#blueGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <polygon points="280,110 325,90 310,145" fill="url(#blueGradient)" />

    <g transform="translate(180, 185)">
        <rect x="-40" y="-35" width="80" height="70" rx="16" fill="#212529" shadow="sm" />
        <text x="0" y="12" font-family="monospace" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
    </g>

    <g transform="translate(315, 90) scale(0.9)" filter="url(#glow)">
        <polygon points="0,-30 9,-9 30,-9 13,4 19,25 0,12 -19,25 -13,4 -30,-9 -9,-9" fill="url(#goldGradient)" />
    </g>
    
    <g transform="translate(90, 270) scale(0.7)">
        <circle cx="0" cy="0" r="24" fill="url(#goldGradient)" />
        <circle cx="0" cy="0" r="16" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6"/>
    </g>
</svg>