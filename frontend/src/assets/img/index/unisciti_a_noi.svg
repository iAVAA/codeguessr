<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="auto">
    <defs>
        <linearGradient id="blueGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0d6efd" />
            <stop offset="100%" stop-color="#0dcaf0" />
        </linearGradient>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffc107" />
            <stop offset="100%" stop-color="#ffda6a" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <circle cx="200" cy="200" r="180" fill="#f8f9fa" />
    <circle cx="200" cy="200" r="145" fill="#ffffff" stroke="#e9ecef" stroke-width="4"/>

    <path d="M 200 200 L 90 120" stroke="#dee2e6" stroke-width="6" stroke-dasharray="10 10" />
    <path d="M 200 200 L 320 150" stroke="#dee2e6" stroke-width="6" stroke-dasharray="10 10" />
    <path d="M 200 200 L 260 310" stroke="#dee2e6" stroke-width="6" stroke-dasharray="10 10" />

    <circle cx="90" cy="120" r="35" fill="#ffffff" stroke="#0dcaf0" stroke-width="6"/>
    <circle cx="90" cy="112" r="10" fill="#0dcaf0"/>
    <path d="M 72 135 Q 90 110 108 135" stroke="#0dcaf0" stroke-width="6" fill="none" stroke-linecap="round"/>

    <circle cx="320" cy="150" r="40" fill="#ffffff" stroke="#0d6efd" stroke-width="6"/>
    <circle cx="320" cy="140" r="12" fill="#0d6efd"/>
    <path d="M 298 168 Q 320 140 342 168" stroke="#0d6efd" stroke-width="6" fill="none" stroke-linecap="round"/>

    <circle cx="260" cy="310" r="30" fill="#ffffff" stroke="#ffc107" stroke-width="6"/>
    <circle cx="260" cy="303" r="8" fill="#ffc107"/>
    <path d="M 245 323 Q 260 305 275 323" stroke="#ffc107" stroke-width="6" fill="none" stroke-linecap="round"/>

    <g transform="translate(140, 140)">
        <rect x="0" y="10" width="120" height="150" rx="16" fill="rgba(0,0,0,0.08)" filter="url(#glow)"/>
        <rect x="0" y="0" width="120" height="150" rx="16" fill="#212529" />
        <path d="M 0 16 Q 0 0 16 0 L 104 0 Q 120 0 120 16 L 120 40 L 0 40 Z" fill="#343a40" />
        <circle cx="60" cy="20" r="6" fill="#ffc107" />
        
        <text x="60" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="url(#blueGradient)" text-anchor="middle">#1</text>
        
        <rect x="20" y="115" width="80" height="6" rx="3" fill="#0d6efd" />
        <rect x="30" y="130" width="60" height="6" rx="3" fill="#dee2e6" opacity="0.4"/>
    </g>

    <path d="M 240 160 Q 330 80 370 110" fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <polygon points="355,95 385,115 350,128" fill="url(#goldGradient)" filter="url(#glow)"/>
</svg>
