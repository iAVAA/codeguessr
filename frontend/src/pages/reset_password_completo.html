<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="icon" type="image/webp" href="src/assets/icons/logo.ico" />
    <title>Reset Password - CodeGuessr</title>
    <style>
        .login-card {
            max-width: 420px;
            width: 100%;
        }

        @media (max-width: 576px) {
            .login-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">
    
    <main class="container min-vh-100 d-flex align-items-start justify-content-center pt-5">

        

        <section class="card shadow-sm border-0 login-card" id = "form_visibile">
            <h1 class="h3 text-center mb-4">Resetta la password</h1>

            <div id="ErrorAlert" class="alert alert-danger d-none" role="alert"> </div>
            <div id="GoodAlert" class="alert alert-success d-none" role="alert"> </div>

            <form id="resetPasswordForm" class="p-4">
                <div class="mb-3">
                    <label for="resetPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="resetPassword" placeholder="Inserisci la tua password" required>
                </div>
                <div class="mb-3">
                    <label for="resetPasswordConfirm" class="form-label">Conferma Password</label>
                    <input type="password" class="form-control" id="resetPasswordConfirm" placeholder="Inserisci di nuovo la tua password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">Resetta Password</button>
            </form>

            
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="/src/js/reset_password_completo.js"></script>
</body>
</html>
