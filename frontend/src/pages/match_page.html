<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('/index.html');
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeGuessr - Partita</title>
  <link rel="icon" type="image/webp" href="src/assets/img/logo.webp" />

  <!-- Anti-FOUC -->
  <script id="fouc-prevention">
    (function () {
      var t = localStorage.getItem('codeguessr-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (t === 'light' || (!t && !prefersDark)) {
        document.documentElement.classList.add('light-mode');
      }
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />

  <style id="anti-flash">
    body.loader-open>*:not(#globalLoader):not(#noscript-wall):not(script):not(style) {
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>

  <style>
    /* Prevent scrolling on desktop, locking the UI perfectly into the viewport */
    @media (min-width: 992px) {
      body {
        height: 100vh;
        overflow: hidden !important;
      }
      .match-main,
      .match-main > .container-fluid {
        min-height: 0 !important;
      }
    }
  </style>
</head>

<body>
  <script type="module">
    import { initLoader } from '/src/js/loader.js';
    initLoader();
  </script>

  <!-- Countdown Overlay -->
  <div id="match-countdown-overlay" class="match-countdown-overlay d-flex flex-column align-items-center justify-content-center">
    <div class="match-countdown-title mb-3">Preparati!</div>
    <div id="match-countdown-text" class="match-countdown-text">3</div>
  </div>

  <main class="match-main flex-grow-1 d-flex flex-column" id="match-main">
    <div class="container-fluid w-100 p-3 p-lg-4 d-flex flex-column flex-grow-1"
      style="max-width: 1400px;">

      <!-- MATCH HEADER -->
      <div class="match-header w-100 d-flex justify-content-between align-items-center mb-2 px-2">
        <!-- Left: Leave btn -->
        <a href="/home" class="btn btn-danger rounded-pill d-flex align-items-center gap-2 shadow match-leave-btn">
          <i class="bi bi-box-arrow-left"></i> Abbandona
        </a>

        <!-- Right: Settings and Info -->
        <div class="d-flex gap-2">
          <button class="btn btn-dark rounded-circle shadow d-flex align-items-center justify-content-center match-header-btn" title="Informazioni">
            <i class="bi bi-question-lg fs-5"></i>
          </button>
          <button class="btn btn-dark rounded-circle shadow d-flex align-items-center justify-content-center match-header-btn" title="Impostazioni" data-bs-toggle="modal" data-bs-target="#settingsModal">
            <i class="bi bi-gear-fill fs-5"></i>
          </button>
        </div>
      </div>

      <!-- TOP: SCOREBOARD -->
      <div class="match-scoreboard row align-items-stretch mb-2 mt-2 px-2 gx-2 gx-lg-5">

        <!-- Player 1 -->
        <div class="col-12 col-md-4 d-flex mb-3 mb-md-0">
          <div class="match-player-card w-100 h-100 d-flex flex-column justify-content-center">
            <div class="d-flex align-items-center gap-3">
              <img src="" alt="Player" class="match-avatar" id="match-p1-avatar">
              <div class="match-player-info">
                <div class="match-player-name text-truncate" id="match-p1-name" style="max-width: 150px;">Caricamento...
                </div>
                <div class="match-player-stats">
                  <span class="stat-tier">LVL <span id="match-p1-lvl">--</span></span>
                  <span class="stat-divider">&bull;</span>
                  <span class="profile-cups">
                    <i class="bi bi-trophy-fill"></i> <span id="match-p1-cups">--</span>
                  </span>
                </div>
              </div>
            </div>
            <!-- Health Bar -->
            <div class="match-health-wrap mt-2">
              <div class="progress"
                style="height: 12px; background: rgba(var(--darcula-bg), 0.8); border: 1px solid rgba(var(--darcula-comment), 0.3); border-radius: 6px;">
                <div class="progress-bar health-fill" id="match-p1-health" role="progressbar" style="width: 100%; border-radius: 6px;"
                  aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <div class="health-text text-end mt-1 fw-bold"
                style="font-size: 0.8rem; color: rgb(var(--darcula-fg)); font-family: 'JetBrains Mono', monospace;">
                <span id="match-p1-hp">100</span>/100
              </div>
            </div>
          </div>
        </div>

        <!-- Center Data -->
        <div
          class="col-12 col-md-4 d-flex align-items-stretch justify-content-center mb-3 mb-md-0">
          <div class="match-timer-container h-100 d-flex flex-column align-items-center justify-content-center">
            <div class="match-round-text mb-1" id="match-round">Round 1/5</div>
            <div class="match-timer" id="match-timer">00:30</div>
          </div>
        </div>

        <!-- Player 2 -->
        <div class="col-12 col-md-4 d-flex mb-3 mb-md-0">
          <div class="match-player-card match-opponent-card text-end w-100 h-100 d-flex flex-column justify-content-center">
            <div class="d-flex align-items-center gap-3 flex-row-reverse">
              <img src="" alt="Opponent" class="match-avatar" id="match-p2-avatar">
              <div class="match-player-info">
                <div class="match-player-name text-truncate" id="match-p2-name" style="max-width: 150px;">Caricamento...
                </div>
                <div class="match-player-stats justify-content-end">
                  <span class="profile-cups">
                    <i class="bi bi-trophy-fill"></i> <span id="match-p2-cups">--</span>
                  </span>
                  <span class="stat-divider">&bull;</span>
                  <span class="stat-tier">LVL <span id="match-p2-lvl">--</span></span>
                </div>
              </div>
            </div>
            <!-- Health Bar -->
            <div class="match-health-wrap mt-2">
              <div class="progress"
                style="height: 12px; background: rgba(var(--darcula-bg), 0.8); border: 1px solid rgba(var(--darcula-comment), 0.3); border-radius: 6px;">
                <div class="progress-bar health-fill" id="match-p2-health" role="progressbar" style="width: 100%; border-radius: 6px;"
                  aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <div class="health-text text-start mt-1 fw-bold"
                style="font-size: 0.8rem; color: rgb(var(--darcula-fg)); font-family: 'JetBrains Mono', monospace;">
                <span id="match-p2-hp">100</span>/100
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- MIDDLE: PLAY AREA (Code + Guess) -->
      <div class="row flex-grow-1 justify-content-center align-items-stretch pb-2">
        <div class="col-12 col-xl-12 d-flex flex-column">
          <div class="play-area-container p-3 p-md-4 d-flex flex-column flex-lg-row gap-4 gap-lg-5 flex-grow-1">
            
            <!-- CODE WINDOW -->
            <div class="vscode-match-window vscode-match-window--responsive shadow-lg d-flex flex-column">
              <!-- Fake Titlebar -->
              <div class="vscode-titlebar">
                <div class="vscode-mac-btns">
                  <span class="mac-btn close"></span>
                  <span class="mac-btn minimize"></span>
                  <span class="mac-btn maximize"></span>
                </div>
                <div class="vscode-title"><i class="bi bi-file-earmark-code"></i> snippet.txt - Visual Studio Code</div>
              </div>
              <!-- Editor -->
              <div class="vscode-editor-body p-0 flex-grow-1 match-editor-body" style="display: flex; flex-direction: column;">
                <div id="monaco-container" class="match-monaco-container"></div>
              </div>
            </div>

            <!-- GUESS BOX -->
            <div class="match-guess-wrapper d-flex flex-column justify-content-center">
              <div class="match-guess-container p-4 w-100 d-flex flex-column justify-content-center h-100" style="min-height: 200px;">
                <h5 class="guess-label mb-3 text-center">Indovina il linguaggio <i class="bi bi-keyboard"></i></h5>
                <form id="guess-form" class="d-flex flex-column gap-3 mt-auto mb-auto">
                  <input type="text" class="form-control guess-input w-100 text-center" id="guess-input"
                    placeholder="Python, JS, C++..." autocomplete="off" required>
                  <button type="submit" class="btn btn-primary guess-btn w-100 py-2"><i class="bi bi-send-fill"></i> Invia</button>
                </form>
                <div id="guess-feedback" class="mt-3 text-center text-darcula-comment"
                  style="min-height: 24px; font-weight:500;">Attesa risposta...</div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- =====================
       FOOTER
       ===================== -->
  <footer class="site-footer" id="site-footer" style="flex-shrink: 0;">
    <div class="container">
      <div class="footer-bottom">
        <!-- Left: copyright + authors + license -->
        <div class="footer-copy">
          <!-- Riga 1: brand -->
          <span class="footer-brand">
            <i class="bi bi-c-circle"></i> 2026 <strong>CodeGuessr</strong>
          </span>
          <!-- Separatore desktop -->
          <span class="footer-sep" aria-hidden="true">&mdash;</span>
          <!-- Riga 2: autori -->
          <span class="footer-authors">
            Salvatore Iavarone &amp; Michele Pio Forlani
          </span>
          <!-- Separatore desktop -->
          <span class="footer-sep" aria-hidden="true">&bull;</span>
          <!-- Licenza + versione -->
          <a href="https://github.com/iAVAA/codeguessr/blob/main/LICENSE" target="_blank" class="footer-license">Licenza
            MIT</a>
          <span class="footer-sep" aria-hidden="true">&bull;</span>
          <span class="footer-version">v1.0.0-alpha</span>
        </div>
        <!-- Right: social + site links -->
        <div class="footer-links-inline">
          <a href="https://github.com/iAVAA/codeguessr" target="_blank" class="social-btn" aria-label="GitHub"
            title="GitHub">
            <i class="bi bi-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/salvatoreiavarone" class="social-btn" aria-label="LinkedIn"
            title="LinkedIn">
            <i class="bi bi-linkedin"></i>
          </a>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=iavarone.2056502@studenti.uniroma1.it,forlani.2115153@studenti.uniroma1.it&su=Supporto%20Geoguessr"
            target="_blank" class="social-btn" aria-label="Contattaci" title="Contattaci">
            <i class="bi bi-envelope-fill"></i>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Monaco Editor Loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

  <script src="/src/js/managers/theme.js"></script>
  <script type="module" src="/src/js/match_page/match.js"></script>
</body>

</html>
