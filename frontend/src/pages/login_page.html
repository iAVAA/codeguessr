<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        if (localStorage.getItem('isLoggedIn') === 'true') {
                // Usa .replace() così l'intruso non può usare il tasto "Indietro" del browser per tornare qui
                window.location.replace('/home');
            }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <link rel="stylesheet" href="src/css/style.css">
    <title>Login - CodeGuessr</title>
    <style>
        .login-card {
            max-width: 420px;
            width: 100%;
        }

        @media (max-width: 576px) {
            .login-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">
    <main class="container min-vh-100 d-flex align-items-start justify-content-center pt-5">
        <section class="card shadow-sm border-0 login-card">
            <h1 class="h3 text-center mb-4">Accedi</h1>

            <div id="GoodAlert" class="alert alert-success d-none" role="alert"> </div>
            <div id="ErrorAlert" class="alert alert-danger d-none" role="alert"> </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="Inserisci la tua email" required>
                </div>

                <div class="mb-2">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Inserisci la tua password" required>
                </div>

                <button type="submit" id="loginButton" class="btn btn-primary w-100 mt-2">Accedi</button>
            </form>

            <div class="text-center mt-3">
                <a href="reset_password.html" class="link-secondary text-decoration-none">Hai dimenticato la password?</a>
            </div>

            

            <div class="text-center mt-3">
                <a href="../../index.html" class="link-primary text-decoration-none">Crea un account</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/js/managers/sound.js"></script>
    <script src="src/js/login_page.js"></script>
</body>
</html>
