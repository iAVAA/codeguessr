<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Login - CodeGuessr</title>
    <style>
        .login-card {
            max-width: 420px;
            width: 100%;
        }

        @media (max-width: 576px) {
            .login-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">
    <main class="container min-vh-100 d-flex align-items-start justify-content-center pt-5">
        <section class="card shadow-sm border-0 login-card">
            <h1 class="h3 text-center mb-4">Resetta la password</h1>

            <form>
                <div class="mb-3">
                    <label for="resetEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="resetEmail" placeholder="Inserisci la tua email" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">Resetta Password</button>
            </form>

            
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
